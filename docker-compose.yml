services:
  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/operator.db
      CONFIG_PATH: /app/data/config.json
    volumes:
      - operator-data:/app/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/operator.db
      CONFIG_PATH: /app/data/config.json
      PORT: "3000"
      HOSTNAME: 0.0.0.0
    ports:
      - "3013:3000"
    volumes:
      - operator-data:/app/data

volumes:
  operator-data:
